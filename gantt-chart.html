<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Div + SVG 排产甘特图</title>
    <style>
      /* 基础重置 */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        padding: 20px;
      }

      /* 核心容器：使用 CSS Grid 划分 4 个区域
    1. 左上角 (固定)
    2. 顶部时间轴 (固定顶部)
    3. 左侧资源列 (固定左侧)
    4. 右下数据区 (可滚动的主体)
  */
      .gantt-wrapper {
        display: grid;
        /* 左侧资源列宽 150px，右侧内容由实际宽度撑开 */
        grid-template-columns: 150px max-content;
        /* 顶部表头高 40px，下方内容由实际高度撑开 */
        grid-template-rows: 40px max-content;
        width: 800px;
        height: 300px;
        overflow: auto; /* 核心：触发双向滚动 */
        border: 1px solid #cbd5e1;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        background-color: #fff;
      }

      /* 1. 左上角交叉区 */
      .gantt-corner {
        grid-column: 1;
        grid-row: 1;
        position: sticky;
        top: 0;
        left: 0;
        z-index: 10; /* 最高层级 */
        background-color: #e2e8f0;
        border-right: 1px solid #cbd5e1;
        border-bottom: 1px solid #cbd5e1;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 13px;
        box-shadow: 2px 2px 3px rgba(0, 0, 0, 0.05);
      }

      /* 2. 顶部时间轴 */
      .gantt-timeline {
        grid-column: 2;
        grid-row: 1;
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        background-color: #f8fafc;
        border-bottom: 1px solid #cbd5e1;
        box-shadow: 0 2px 3px rgba(0, 0, 0, 0.05);
      }

      .time-tick {
        width: 100px; /* 固定时间颗粒度的宽度 */
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        color: #475569;
        border-right: 1px solid #e2e8f0;
      }

      /* 3. 左侧资源列 */
      .gantt-resources {
        grid-column: 1;
        grid-row: 2;
        position: sticky;
        left: 0;
        z-index: 5;
        background-color: #fff;
        border-right: 1px solid #cbd5e1;
        box-shadow: 2px 0 3px rgba(0, 0, 0, 0.05);
      }

      .resource-item {
        height: 40px; /* 每行高度需与 SVG 中的网格高度对齐 */
        display: flex;
        align-items: center;
        padding: 0 10px;
        font-size: 13px;
        color: #334155;
        border-bottom: 1px solid #f1f5f9;
        font-weight: 500;
      }

      /* 4. 数据渲染区 */
      .gantt-data {
        grid-column: 2;
        grid-row: 2;
        /* 确保移除内部 SVG 的隐形下边距 */
        line-height: 0;
      }

      /* SVG 内部样式 */
      .task-text {
        font-size: 12px;
        fill: #fff;
        pointer-events: none; /* 让鼠标事件穿透文字直接作用于矩形块 */
        user-select: none;
      }
      .task-bar {
        cursor: pointer;
        transition: filter 0.2s;
      }
      .task-bar:hover {
        filter: brightness(1.1); /* hover 提亮效果 */
      }
    </style>
  </head>
  <body>
    <div class="gantt-wrapper">
      <div class="gantt-corner">资源 \ 时间</div>

      <div class="gantt-timeline">
        <div class="time-tick">08:00</div>
        <div class="time-tick">09:00</div>
        <div class="time-tick">10:00</div>
        <div class="time-tick">11:00</div>
        <div class="time-tick">12:00</div>
        <div class="time-tick">13:00</div>
        <div class="time-tick">14:00</div>
        <div class="time-tick">15:00</div>
        <div class="time-tick">16:00</div>
        <div class="time-tick">17:00</div>
      </div>

      <div class="gantt-resources">
        <div class="resource-item">CNC 加工中心 A</div>
        <div class="resource-item">CNC 加工中心 B</div>
        <div class="resource-item">装配线 1</div>
        <div class="resource-item">装配线 2</div>
        <div class="resource-item">质检工位 1</div>
        <div class="resource-item">质检工位 2</div>
        <div class="resource-item">打包线 A</div>
        <div class="resource-item">打包线 B</div>
      </div>

      <div class="gantt-data">
        <svg width="1000" height="320" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <pattern
              id="grid"
              width="100"
              height="40"
              patternUnits="userSpaceOnUse"
            >
              <path
                d="M 100 0 L 100 40 L 0 40"
                fill="none"
                stroke="#f1f5f9"
                stroke-width="1"
              />
            </pattern>
          </defs>

          <rect width="100%" height="100%" fill="url(#grid)" />

          <g transform="translate(10, 5)">
            <rect
              class="task-bar"
              width="180"
              height="30"
              rx="4"
              fill="#3b82f6"
            />
            <text class="task-text" x="10" y="20">订单 PO-101 (粗加工)</text>
          </g>

          <g transform="translate(320, 5)">
            <rect
              class="task-bar"
              width="260"
              height="30"
              rx="4"
              fill="#ef4444"
            />
            <text class="task-text" x="10" y="20">订单 PO-099 (延期)</text>
          </g>

          <g transform="translate(120, 45)">
            <rect
              class="task-bar"
              width="250"
              height="30"
              rx="4"
              fill="#10b981"
            />
            <text class="task-text" x="10" y="20">订单 PO-102 (外壳打磨)</text>
          </g>
          <g transform="translate(510, 45)">
            <rect
              class="task-bar"
              width="180"
              height="30"
              rx="4"
              fill="#f59e0b"
            />
            <text class="task-text" x="10" y="20">设备保养维护</text>
          </g>

          <g transform="translate(220, 85)">
            <rect
              class="task-bar"
              width="150"
              height="30"
              rx="4"
              fill="#6366f1"
            />
            <text class="task-text" x="10" y="20">订单 PO-100 (总装)</text>
          </g>
          <g transform="translate(710, 85)">
            <rect
              class="task-bar"
              width="200"
              height="30"
              rx="4"
              fill="#8b5cf6"
            />
            <text class="task-text" x="10" y="20">订单 PO-101 (总装)</text>
          </g>
        </svg>
      </div>
    </div>
  </body>
</html>
